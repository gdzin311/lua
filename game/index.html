<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Lander Game</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./script/terreno.js"></script>
    <script src="./script/hud.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="staticCanvas"></canvas>
        
        <canvas id="dinamicCanvas"></canvas>
    </div>
</body>
<script>
    let h= 550;
    let w= 800;

    let canvas_dinamic = document.getElementById("dinamicCanvas"); 
    let canvas_static = document.getElementById("staticCanvas");

    canvas_dinamic.height = h;
    canvas_dinamic.width = w;
    canvas_static.height = h;
    canvas_static.width = w;

    let ctx_dinamic = canvas_dinamic.getContext("2d");
    let ctx_static = canvas_static.getContext("2d");

    const terreno = new Terreno(w, h, ctx_static)
    const hud = new Hud(w, h, ctx_dinamic)

    terreno.draw()
    hud.print()
</script>
</html>
