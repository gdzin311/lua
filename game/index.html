<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Lander Game</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./script/terreno.js"></script>
    <script src="./script/hud.js"></script>
    <script src="./script/nave.js"></script>
</head>
<body>
    <div id="gameContainer">
        <canvas id="staticCanvas"></canvas>
        
        <canvas id="dinamicCanvas"></canvas>
    </div>
</body>
<script>
    let h= 550;
    let w= 800;

    let canvas_dinamic = document.getElementById("dinamicCanvas"); 
    let canvas_static = document.getElementById("staticCanvas");

    canvas_dinamic.height = h;
    canvas_dinamic.width = w;
    canvas_static.height = h;
    canvas_static.width = w;

    let ctx_dinamic = canvas_dinamic.getContext("2d");
    let ctx_static = canvas_static.getContext("2d");

    const terreno = new Terreno(w, h, ctx_static);
    const nave = new Nave(ctx_dinamic);
    const hud = new Hud(w, h, ctx_dinamic, nave);

    let frames = 0;
    let segundos = 0;

    function loop()
    {
        frames++;
   
        if (frames >= 60) 
        {
            segundos++;
            frames = 0; 
        }

        nave.update();
        ctx_dinamic.clearRect(0, 0, w, h);
        nave.drawHitbox();
        hud.print()
        hud.multiplicadores()
    }

    setInterval(loop, 1000/60);

    hud.print()
</script>
</html>
